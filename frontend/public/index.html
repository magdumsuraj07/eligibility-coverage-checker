<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eligibility Coverage Checker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Insurance Eligibility Checker</h1>
      <p class="subtitle">Check coverage status, service eligibility, and copay estimate.</p>

      <form id="eligibility-form" class="card">
        <label>
          Patient ID
          <input type="text" id="patientId" placeholder="e.g. P1001" required />
        </label>

        <label>
          Insurance Provider
          <select id="insuranceProvider" required>
            <option value="">Select provider</option>
            <option value="Aetna">Aetna</option>
            <option value="BlueCross">BlueCross</option>
          </select>
        </label>

        <label>
          Service Type
          <select id="serviceType" required>
            <option value="">Select service</option>
            <option value="Consultation">Consultation</option>
            <option value="Lab Test">Lab Test</option>
            <option value="Surgery">Surgery</option>
            <option value="X-Ray">X-Ray</option>
          </select>
        </label>

        <button type="submit">Check Eligibility</button>
      </form>

      <section id="result" class="card result hidden"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
